<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protected Application</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }
    .status {
      max-width: 760px;
      margin: 60px auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 26px 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      line-height: 1.55;
    }
    .error {
      color: #b00020;
    }
    code {
      background: #f1f1f1;
      padding: 2px 5px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="status" id="status">
    <h2>Application integrity check</h2>
    <p>Checking file integrity before execution...</p>
  </div>

  <script>
  (async function () {
    "use strict";

    const EXPECTED_SHA256 = "aa8cfa05d1535236031118dabd83b8a5245f8510b4b5beee6adefa329d48cbc6";
    const APP_FILE = "app.js";
    const AUTHOR = "N. Kalodoukas";
    const APP_ID = "NK-HTML-LOCKED-BUILD";
    const ORIGINAL_FILE = "index.html";

    function showError(title, message) {
      document.body.innerHTML = `
        <div class="status error">
          <h2>${title}</h2>
          <p>${message}</p>
          <p><strong>The application has been stopped for protection reasons.</strong></p>
        </div>
      `;
    }

    async function sha256Hex(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    try {
      if (!window.crypto || !window.crypto.subtle) {
        showError(
          "Integrity check unavailable",
          "This browser does not support Web Crypto API, or the file is running in an unsupported environment."
        );
        return;
      }

      const response = await fetch(APP_FILE, {
        cache: "no-store",
        headers: { "Cache-Control": "no-cache" }
      });

      if (!response.ok) {
        showError(
          "Application file loading failed",
          "The file <code>app.js</code> could not be loaded."
        );
        return;
      }

      const appCode = await response.text();
      const actualHash = await sha256Hex(appCode);

      if (actualHash !== EXPECTED_SHA256) {
        showError(
          "Integrity check failed",
          "The file <code>app.js</code> has been modified or corrupted. The application will not run."
        );
        console.error("Checksum failed", {
          expected: EXPECTED_SHA256,
          actual: actualHash,
          author: AUTHOR,
          appId: APP_ID,
          originalFile: ORIGINAL_FILE
        });
        return;
      }

      const script = document.createElement("script");
      script.textContent = appCode;
      document.body.appendChild(script);

    } catch (error) {
      console.error(error);
      showError(
        "Integrity check error",
        "An error occurred during integrity verification or application execution."
      );
    }
  })();
  </script>
</body>
</html>
